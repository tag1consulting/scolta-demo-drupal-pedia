name: the-athenaeum
type: drupal
docroot: web
php_version: "8.3"
webserver_type: nginx-fpm
router_http_port: "80"
router_https_port: "443"
mariadb_version: "10.11"
database:
  type: mariadb
  version: "10.11"

hooks:
  post-start:
    - exec: composer install --no-interaction
    - exec: "mkdir -p /var/www/html/web/modules/contrib/scolta-drupal/{js,css} && cp /var/www/html/patches/scolta.js /var/www/html/web/modules/contrib/scolta-drupal/js/scolta.js 2>/dev/null || true && cp /var/www/html/vendor/tag1/scolta-php/assets/css/scolta.css /var/www/html/web/modules/contrib/scolta-drupal/css/scolta.css 2>/dev/null || true"
    - exec: |
        if [ -f /var/www/html/db/dump.sql.gz ]; then
          echo "Importing database..."
          zcat /var/www/html/db/dump.sql.gz | mysql -u root -proot db
          drush cache:rebuild
          echo "Database imported and caches cleared."
          echo "Building Scolta search index..."
          mkdir -p /var/www/html/web/sites/default/private
          drush scolta:build
          echo "Search index built."
        else
          echo "No database dump found, skipping import."
        fi

web_environment:
  - SCOLTA_API_KEY=SCOLTA_API_KEY_PLACEHOLDER

additional_fqdns: []
