name: the-athenaeum
type: drupal
docroot: web
php_version: "8.3"
webserver_type: nginx-fpm
router_http_port: "80"
router_https_port: "443"
mariadb_version: "10.11"
database:
  type: mariadb
  version: "10.11"

hooks:
  post-start:
    - exec-host: |
        RELEASE_JSON=$(curl -s "https://api.github.com/repos/tag1consulting/scolta-demo-drupal-pedia/releases/latest")
        if [ ! -f db/dump.sql.gz ]; then
          echo ""
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  Downloading database dump (~490 MB) — please wait  │"
          echo "│  This is a one-time download and may take minutes.  │"
          echo "└─────────────────────────────────────────────────────┘"
          mkdir -p db
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | grep -o "https://[^\"]*dump\.sql\.gz[^\"]*" | head -1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "ERROR: Could not find dump.sql.gz in the latest GitHub release."
            echo "Download manually: https://github.com/tag1consulting/scolta-demo-drupal-pedia/releases/latest"
            exit 1
          fi
          curl -L --progress-bar -o db/dump.sql.gz "$DOWNLOAD_URL"
          echo "Database dump downloaded."
        fi
        if [ ! -d web/sites/default/files/article-images ] || [ -z "$(ls -A web/sites/default/files/article-images 2>/dev/null)" ]; then
          echo ""
          echo "┌──────────────────────────────────────────────────────────┐"
          echo "│  Downloading article images (~1.6 GB) — please wait      │"
          echo "│  This is a one-time download and may take several minutes │"
          echo "└──────────────────────────────────────────────────────────┘"
          mkdir -p web/sites/default/files
          IMAGES_URL=$(echo "$RELEASE_JSON" | grep -o "https://[^\"]*article-images\.tar\.gz[^\"]*" | head -1)
          if [ -z "$IMAGES_URL" ]; then
            echo "ERROR: Could not find article-images.tar.gz in the latest GitHub release."
            echo "Download manually: https://github.com/tag1consulting/scolta-demo-drupal-pedia/releases/latest"
            exit 1
          fi
          curl -L --progress-bar -o /tmp/article-images.tar.gz "$IMAGES_URL"
          tar -xzf /tmp/article-images.tar.gz -C web/sites/default/files/
          rm /tmp/article-images.tar.gz
          echo "Article images downloaded and extracted."
        fi
    - exec: composer install --no-interaction
    - exec-host: |
        if [ -f db/dump.sql.gz ] && [ ! -f db/.imported ]; then
          echo "Importing database (this takes a few minutes)..."
          ddev import-db --file=db/dump.sql.gz
          echo "Rebuilding caches and building Scolta search index..."
          mkdir -p web/sites/default/private
          ddev drush cache:rebuild
          ddev drush scolta:build
          touch db/.imported
          echo "Setup complete."
        fi

web_environment:
  - SCOLTA_API_KEY=SCOLTA_API_KEY_PLACEHOLDER

additional_fqdns: []
