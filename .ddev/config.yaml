name: the-athenaeum
type: drupal
docroot: web
php_version: "8.3"
webserver_type: nginx-fpm
router_http_port: "80"
router_https_port: "443"
mariadb_version: "10.11"
database:
  type: mariadb
  version: "10.11"

hooks:
  post-start:
    - exec-host: |
        if [ ! -f db/dump.sql.gz ]; then
          echo ""
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  Downloading database dump (~586 MB) — please wait  │"
          echo "│  This is a one-time download and may take minutes.  │"
          echo "└─────────────────────────────────────────────────────┘"
          mkdir -p db
          DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/tag1consulting/scolta-demo-drupal-pedia/releases/latest" \
              | grep -o "https://[^\"]*dump\.sql\.gz[^\"]*" | head -1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "ERROR: Could not find dump.sql.gz in the latest GitHub release."
            echo "Download manually: https://github.com/tag1consulting/scolta-demo-drupal-pedia/releases/latest"
            exit 1
          fi
          curl -L --progress-bar -o db/dump.sql.gz "$DOWNLOAD_URL"
          echo "Download complete."
        fi
    - exec: composer install --no-interaction
    - exec: |
        if [ -f /var/www/html/db/dump.sql.gz ]; then
          echo "Importing database..."
          zcat /var/www/html/db/dump.sql.gz | mysql -u root -proot db
          drush cache:rebuild
          echo "Database imported and caches cleared."
          echo "Building Scolta search index..."
          mkdir -p /var/www/html/web/sites/default/private
          drush scolta:build
          echo "Search index built."
        fi

web_environment:
  - SCOLTA_API_KEY=SCOLTA_API_KEY_PLACEHOLDER

additional_fqdns: []
