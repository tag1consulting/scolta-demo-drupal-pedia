services:
  athenaeum_import.commands:
    class: Drupal\athenaeum_import\Commands\AthenaeumImportCommands
    arguments:
      - '@entity_type.manager'
      - '@file.repository'
      - '@logger.channel.athenaeum_import'
    tags:
      - { name: drush.command }

  logger.channel.athenaeum_import:
    parent: logger.channel_base
    arguments: ['athenaeum_import']
